<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZeroPointAI — next</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   ZERO UI — Basic (next_zero)
   Matrix dark default + Sacred light toggle
   Anpassad för kärnarkitekturen — ingen Hermes, ingen
   session-komprimering, ingen provider-select.
   Zero väljer gear själv.
═══════════════════════════════════════════════════════ */
:root {
  --bg:         #050a05;
  --bg2:        #0a100a;
  --bg3:        #0f180f;
  --border:     rgba(0,255,65,0.10);
  --border2:    rgba(0,255,65,0.22);
  --text:       #c8ffce;
  --text2:      #7abf80;
  --text3:      #3a6640;
  --accent:     #00ff41;
  --user-bg:    #0d2010;
  --user-text:  #a0ffaa;
  --zero-bg:    #0a150a;
  --code-bg:    #060e06;
  --input-bg:   #0a130a;
  --input-bdr:  rgba(0,255,65,0.18);
  --hover:      rgba(0,255,65,0.05);
  --scrollbar:  rgba(0,255,65,0.18);
  --radius:     12px;
  --radius-sm:  8px;
  --font:       'Söhne','Helvetica Neue',sans-serif;
  --font-mono:  'Fira Code','Consolas',monospace;
  --tr:         0.18s ease;
  --sidebar-w:  240px;
  --status-h:   36px;
  --torus-ring: #00ff41;
  --torus-glow: rgba(0,255,65,0.6);
}

[data-theme="sacred"] {
  --bg:         #fdf8ef;
  --bg2:        #f5edd8;
  --bg3:        #fffdf7;
  --border:     rgba(180,130,0,0.12);
  --border2:    rgba(180,130,0,0.25);
  --text:       #2a1f00;
  --text2:      #7a5a10;
  --text3:      #b09060;
  --accent:     #c89400;
  --user-bg:    #2a1f00;
  --user-text:  #fdf8ef;
  --zero-bg:    #fffdf7;
  --code-bg:    #f5edd8;
  --input-bg:   #fffdf7;
  --input-bdr:  rgba(180,130,0,0.20);
  --hover:      rgba(180,130,0,0.06);
  --scrollbar:  rgba(180,130,0,0.18);
  --torus-ring: #c89400;
  --torus-glow: rgba(200,148,0,0.5);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── Canvas ── */
#matrix-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  opacity: 0.35;
  z-index: 0;
}

/* ── Layout ── */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--status-h) 1fr;
  height: 100vh;
  position: relative;
  z-index: 1;
  transition: grid-template-columns var(--tr);
}
#app.sidebar-hidden {
  grid-template-columns: 0 1fr;
}

/* ── Status bar ── */
#status-bar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 14px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text2);
  overflow: hidden;
}

/* Torus logo */
.torus-logo {
  flex-shrink: 0;
  width: 22px; height: 22px;
  position: relative;
  cursor: pointer;
}
.torus-logo svg { width: 100%; height: 100%; }

#status-gen {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.status-sep { color: var(--text3); }

/* Gear badge */
.gear-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  border: 1px solid transparent;
  transition: all 0.3s;
}
.gear-badge.g1 { background: rgba(106,158,90,0.15); border-color: rgba(106,158,90,0.4); color: #6a9e5a; }
.gear-badge.g2 { background: rgba(100,180,255,0.15); border-color: rgba(100,180,255,0.4); color: #64b4ff; }
.gear-badge.g3 { background: rgba(0,255,65,0.15); border-color: rgba(0,255,65,0.4); color: #00ff41; }

/* Semantisk hälsa */
#sem-health {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
}
#sem-health.ok   { background: rgba(106,158,90,0.1); border-color: rgba(106,158,90,0.3); color: #6a9e5a; }
#sem-health.warn { background: rgba(196,168,0,0.1); border-color: rgba(196,168,0,0.3); color: #c4a800; }
#sem-health.err  { background: rgba(192,90,90,0.1); border-color: rgba(192,90,90,0.3); color: #c05a5a; }

#status-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
#session-cost { font-size: 11px; color: var(--text3); }

/* Theme + sidebar toggle */
.icon-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text2); padding: 4px;
  display: flex; align-items: center;
  border-radius: 4px;
  transition: color var(--tr), background var(--tr);
}
.icon-btn:hover { color: var(--text); background: var(--hover); }
.icon-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* Tema-toggle knapp */
.theme-toggle-btn {
  color: var(--text2);
  transition: color var(--tr), background var(--tr), transform 0.3s;
}
.theme-toggle-btn:hover { color: var(--accent); transform: rotate(15deg); }
[data-theme="sacred"] .theme-toggle-btn { color: var(--accent); }
.theme-toggle-btn svg { width: 15px; height: 15px; stroke: none; fill: currentColor; }

/* ── Sidebar ── */
#sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
#sidebar-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }

#new-chat-btn {
  width: 100%; padding: 8px 14px;
  background: none; border: none; border-bottom: 1px solid var(--border);
  color: var(--accent); font-size: 13px; font-family: var(--font);
  text-align: left; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: background var(--tr);
  flex-shrink: 0;
}
#new-chat-btn:hover { background: var(--hover); }

/* System info panel */
#sys-info {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}
#sys-info .si-row {
  display: flex; justify-content: space-between;
  padding: 2px 0;
}
#sys-info .si-val { color: var(--text2); font-family: var(--font-mono); }
#sys-info .si-val.ok { color: #6a9e5a; }
#sys-info .si-val.warn { color: #c4a800; }
#sys-info .si-val.err { color: #c05a5a; }

/* Session list */
#session-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}
#session-list::-webkit-scrollbar { width: 4px; }
#session-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

.sess-item {
  padding: 7px 14px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text2);
  border-left: 2px solid transparent;
  transition: background var(--tr), color var(--tr);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sess-item:hover { background: var(--hover); color: var(--text); }
.sess-item.active { border-left-color: var(--accent); color: var(--text); background: var(--hover); }

/* ── Chat area ── */
#chat-area {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

#chat-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  flex-shrink: 0;
  display: flex; align-items: center; gap: 10px;
}
#chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* sidebar toggle in header */
#sidebar-toggle-btn {
  flex-shrink: 0;
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 16px; padding: 2px 6px;
  border-radius: 4px;
  transition: color var(--tr);
}
#sidebar-toggle-btn:hover { color: var(--text); }

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 8px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 2px; }

/* Welcome */
#welcome {
  margin: auto;
  text-align: center;
  padding: 40px 20px;
  max-width: 480px;
}
.welcome-torus { margin: 0 auto 20px; width: 60px; height: 60px; }
.welcome-torus svg { width: 100%; height: 100%; }
#welcome h1 { font-size: 22px; color: var(--accent); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
#welcome p  { font-size: 13px; color: var(--text2); line-height: 1.6; }
#welcome .gen-label { font-size: 11px; color: var(--text3); margin-top: 12px; letter-spacing: 0.5px; }

/* Zero avatar — sacred tema */
.welcome-avatar {
  display: none;
  margin: 0 auto 16px;
  width: 180px;
  height: 180px;
  position: relative;
}
[data-theme="sacred"] .welcome-avatar { display: block; }
[data-theme="sacred"] .welcome-torus  { display: none; }

.welcome-avatar img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(200,148,0,0.5))
          drop-shadow(0 0 40px rgba(255,160,50,0.3));
  animation: zero-glow 3s ease-in-out infinite;
}
@keyframes zero-glow {
  0%,100% { filter: drop-shadow(0 0 15px rgba(200,148,0,0.4)) drop-shadow(0 0 30px rgba(255,160,50,0.2)); }
  50%      { filter: drop-shadow(0 0 25px rgba(200,148,0,0.7)) drop-shadow(0 0 50px rgba(255,160,50,0.4)); }
}

/* Messages */
.msg-wrap { display: flex; flex-direction: column; max-width: 760px; }
.msg-wrap.user { align-self: flex-end; align-items: flex-end; }
.msg-wrap.assistant { align-self: flex-start; align-items: flex-start; }

.msg-role {
  font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 4px; padding: 0 4px;
  display: flex; align-items: center; gap: 6px;
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 1.65;
  max-width: 100%;
}
.msg-wrap.user .msg-bubble {
  background: var(--user-bg);
  color: var(--user-text);
  border-bottom-right-radius: 4px;
}
.msg-wrap.assistant .msg-bubble {
  background: var(--zero-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

/* Markdown */
.msg-bubble p { margin-bottom: 8px; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 20px; }
.msg-bubble li { margin-bottom: 3px; }
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { margin: 10px 0 6px; color: var(--accent); }
.msg-bubble code:not(pre code) {
  background: var(--code-bg); padding: 1px 5px;
  border-radius: 4px; font-family: var(--font-mono); font-size: 13px;
}
.msg-bubble pre {
  background: var(--code-bg); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  overflow-x: auto; margin: 8px 0; position: relative;
}
.msg-bubble pre code { font-family: var(--font-mono); font-size: 12px; }

/* Copy code btn */
.copy-code-btn {
  position: absolute; top: 6px; right: 6px;
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text2); font-size: 11px; padding: 2px 8px;
  border-radius: 4px; cursor: pointer;
  transition: color var(--tr);
}
.copy-code-btn:hover { color: var(--accent); }

/* Thinking steps */
.thought-toggle {
  font-size: 11px; color: var(--text3); cursor: pointer;
  margin-top: 4px; padding: 2px 4px;
  display: inline-flex; align-items: center; gap: 4px;
  border-radius: 4px;
  transition: color var(--tr), background var(--tr);
}
.thought-toggle:hover { color: var(--text2); background: var(--hover); }
.t-arrow { font-size: 9px; transition: transform 0.2s; }
.t-arrow.open { transform: rotate(90deg); }
.thought-panel {
  display: none; margin-top: 4px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 12px;
  font-size: 12px; color: var(--text2); font-family: var(--font-mono);
}
.thought-panel.open { display: block; }
.thought-step { padding: 2px 0; }

/* Msg time + meta */
.msg-meta {
  font-size: 10px; color: var(--text3); margin-top: 3px;
  padding: 0 4px; display: flex; align-items: center; gap: 6px;
}
.msg-gear { font-size: 10px; }

/* Image */
.msg-image { max-width: 320px; max-height: 260px; border-radius: var(--radius-sm); margin-bottom: 6px; }

/* Image preview */
#preview-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 8px 16px 0;
  flex-shrink: 0;
}
.preview-item {
  position: relative;
  display: flex; align-items: center; gap: 6px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 4px 8px;
  font-size: 11px; color: var(--text2);
}
.preview-item img { width: 32px; height: 32px; object-fit: cover; border-radius: 4px; }
.preview-rm {
  background: none; border: none; color: var(--text3);
  cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
}
.preview-rm:hover { color: #c05a5a; }

/* ── Thinking indicator ── */
#thinking {
  display: none;
  align-self: flex-start;
  padding: 8px 14px;
  background: var(--zero-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px; color: var(--text3);
}
#thinking.visible { display: flex; align-items: center; gap: 8px; }
.thinking-dots span {
  display: inline-block; width: 5px; height: 5px;
  background: var(--accent); border-radius: 50%;
  animation: td 1.2s infinite;
  margin: 0 1px;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes td { 0%,80%,100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

/* ── Input area ── */
#input-area {
  padding: 10px 16px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg2);
  flex-shrink: 0;
}
#input-box {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--input-bg);
  border: 1px solid var(--input-bdr);
  border-radius: var(--radius);
  padding: 8px 10px;
  transition: border-color var(--tr);
}
#input-box:focus-within { border-color: var(--accent); }
#input-box.drag-over { border-color: var(--accent); background: var(--hover); }

#user-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-family: var(--font); font-size: 14px;
  line-height: 1.5; resize: none;
  max-height: 160px; overflow-y: auto; min-height: 24px;
}
#user-input::placeholder { color: var(--text3); }
#user-input::-webkit-scrollbar { width: 3px; }
#user-input::-webkit-scrollbar-thumb { background: var(--scrollbar); }

/* Input action buttons */
.input-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 4px; border-radius: 6px;
  font-size: 16px; flex-shrink: 0; line-height: 1;
  transition: color var(--tr), background var(--tr);
  display: flex; align-items: center;
}
.input-btn:hover { color: var(--text); background: var(--hover); }
.input-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

#send-btn {
  background: var(--accent); border: none; cursor: pointer;
  color: #010a01; width: 32px; height: 32px;
  border-radius: 8px; font-size: 16px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: opacity var(--tr);
}
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#send-btn:not(:disabled):hover { opacity: 0.85; }

#input-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 5px; font-size: 11px; color: var(--text3); padding: 0 2px;
}

/* File input */
#file-input { display: none; }

/* Drag overlay */
#drag-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,255,65,0.05);
  border: 2px dashed var(--accent);
  align-items: center; justify-content: center;
  font-size: 18px; color: var(--accent);
  pointer-events: none;
}
#drag-overlay.active { display: flex; }

/* Toast */
#toast {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; padding: 8px 16px;
  border-radius: 20px; z-index: 900; opacity: 0;
  transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; }

/* Semantic health modal */
#health-modal {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
}
#health-modal.open { display: flex; }
#health-box {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 20px; min-width: 320px;
  max-width: 460px; font-size: 13px;
}
#health-box h3 { color: var(--accent); margin-bottom: 14px; font-size: 14px; }
.h-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
.h-row:last-child { border-bottom: none; }
.h-key { color: var(--text2); }
.h-val { font-family: var(--font-mono); font-size: 12px; }
.h-val.ok { color: #6a9e5a; }
.h-val.warn { color: #c4a800; }
.h-val.err  { color: #c05a5a; }
#health-close {
  margin-top: 14px; width: 100%; padding: 7px;
  background: none; border: 1px solid var(--border2);
  color: var(--text2); border-radius: var(--radius-sm);
  cursor: pointer; font-family: var(--font); font-size: 13px;
}
#health-close:hover { color: var(--text); }
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>

<div id="app">
  <!-- Status bar -->
  <div id="status-bar">
    <div class="torus-logo" onclick="toggleTheme()" title="Byt tema">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="var(--torus-ring)" stroke-width="1.5" fill="none" opacity="0.5"/>
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="var(--torus-ring)" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(60 16 16)"/>
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="var(--torus-ring)" stroke-width="1.5" fill="none" opacity="0.5" transform="rotate(120 16 16)"/>
        <circle cx="16" cy="16" r="4" fill="var(--torus-ring)" opacity="0.8"/>
        <circle cx="16" cy="16" r="2" fill="var(--bg)"/>
      </svg>
    </div>
    <span id="status-gen">ZERO — next</span>
    <span class="status-sep">·</span>
    <span id="status-gear-wrap"><span class="gear-badge g1" id="status-gear">G1 · ollama</span></span>
    <span class="status-sep">·</span>
    <span id="sem-health" class="ok" onclick="openHealthModal()" title="Semantisk hälsa">⬡ emb: ok</span>
    <div id="status-right">
      <span id="session-cost"></span>
      <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" id="theme-btn" title="Byt tema: Matrix ↔ Sacred">
        <svg id="theme-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="4" height="4" rx="1"/><rect x="10" y="3" width="4" height="4" rx="1"/><rect x="17" y="3" width="4" height="4" rx="1"/><rect x="3" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/><rect x="17" y="10" width="4" height="4" rx="1"/><rect x="3" y="17" width="4" height="4" rx="1"/><rect x="10" y="17" width="4" height="4" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleSidebar()" title="Sidopanel" id="sb-toggle-status">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="18" rx="1"/><path d="M14 3h7M14 8h7M14 13h7M14 18h7"/></svg>

<script>
// ══════════════════════════════════════════════════════
//  MATRIX RAIN
// ══════════════════════════════════════════════════════
(function() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx    = canvas.getContext('2d');
  const CHARS  = 'アイウエオZEROPOINT∞⊗◈⬡01LAW';
  let cols, drops;
  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    cols  = Math.floor(canvas.width / 18);
    drops = Array(cols).fill(1);
  }
  function draw() {
    if (document.documentElement.getAttribute('data-theme') === 'sacred') return;
    ctx.fillStyle = 'rgba(5,10,5,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = '13px monospace';
    for (let i = 0; i < cols; i++) {
      const c = CHARS[Math.floor(Math.random() * CHARS.length)];
      ctx.fillStyle = Math.random() > 0.96 ? '#fff' : '#00ff41';
      ctx.globalAlpha = Math.random() * 0.6 + 0.2;
      ctx.fillText(c, i * 18, drops[i] * 18);
      ctx.globalAlpha = 1;
      if (drops[i] * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }
  window.addEventListener('resize', resize);
  resize();
  setInterval(draw, 55);
})();

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const API      = '';
let sessionId  = 'web-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
let theme      = localStorage.getItem('zero-theme') || 'matrix';
let sidebarOpen= localStorage.getItem('zero-sidebar') !== 'hidden';
let sessionCost= 0;
let sessionTok = 0;
let isThinking = false;
let pendingImages = [];
let pendingFiles  = [];
let lastGear = 1;

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  applyTheme(theme);
  applySidebar(sidebarOpen);
  setupTextarea();
  setupDragDrop();
  setupPaste();
  updateStatus();
  setInterval(updateStatus, 30000);
});

// ══════════════════════════════════════════════════════
//  TEMA
// ══════════════════════════════════════════════════════
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t === 'sacred' ? 'sacred' : '');
  localStorage.setItem('zero-theme', t);
  // Uppdatera tema-ikon
  const icon = document.getElementById('theme-icon');
  if (!icon) return;
  if (t === 'sacred') {
    // Sol-ikon för sacred/ljust tema
    icon.innerHTML = '<circle cx="12" cy="12" r="4" fill="currentColor"/>' +
      '<line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="4.22" y1="4.22" x2="6.34" y2="6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="17.66" y1="17.66" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="4.22" y1="19.78" x2="6.34" y2="17.66" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>' +
      '<line x1="17.66" y1="6.34" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
    icon.setAttribute('fill', 'none');
    document.getElementById('theme-btn').title = 'Byt till Matrix (mörkt)';
  } else {
    // Grid-ikon för matrix/mörkt tema
    icon.innerHTML = '<rect x="3" y="3" width="4" height="4" rx="1"/><rect x="10" y="3" width="4" height="4" rx="1"/><rect x="17" y="3" width="4" height="4" rx="1"/>' +
      '<rect x="3" y="10" width="4" height="4" rx="1"/><rect x="10" y="10" width="4" height="4" rx="1"/><rect x="17" y="10" width="4" height="4" rx="1"/>' +
      '<rect x="3" y="17" width="4" height="4" rx="1"/><rect x="10" y="17" width="4" height="4" rx="1"/><rect x="17" y="17" width="4" height="4" rx="1"/>';
    icon.setAttribute('fill', 'currentColor');
    document.getElementById('theme-btn').title = 'Byt till Sacred (ljust)';
  }
}
function toggleTheme() { applyTheme(theme === 'sacred' ? 'matrix' : 'sacred'); }

// ══════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════
function applySidebar(open) {
  sidebarOpen = open;
  document.getElementById('app').classList.toggle('sidebar-hidden', !open);
  document.getElementById('sidebar-toggle-btn').textContent = open ? '‹' : '›';
  localStorage.setItem('zero-sidebar', open ? 'open' : 'hidden');
}
function toggleSidebar() { applySidebar(!sidebarOpen); }

// ══════════════════════════════════════════════════════
//  STATUS
// ══════════════════════════════════════════════════════
async function updateStatus() {
  try {
    const r = await fetch(API + '/status');
    if (!r.ok) return;
    const d = await r.json();

    // Gen label
    const gen = document.getElementById('status-gen');
    if (gen) gen.textContent = 'ZERO · next';

    // Minnen + DB + hälsa
    document.getElementById('si-memories').textContent = (d.memory_count||0).toLocaleString('sv');
    const dbEl = document.getElementById('si-db');
    dbEl.textContent = d.db_ok ? 'OK' : 'Fel';
    dbEl.className   = 'si-val ' + (d.db_ok ? 'ok' : 'err');
    const hEl = document.getElementById('si-health');
    const score = d.health_score || 0;
    hEl.textContent = score + '/100';
    hEl.className   = 'si-val ' + (score >= 70 ? 'ok' : score >= 40 ? 'warn' : 'err');
    document.getElementById('si-uptime').textContent = fmtUptime(d.uptime_s || 0);

    // Gear badge
    updateGearBadge(d.last_gear || 1, d.provider || '?');

  } catch(e) { /* server ej tillgänglig */ }
}

function fmtUptime(s) {
  if (s < 60)   return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  return Math.floor(s/3600) + 'h ' + Math.floor((s%3600)/60) + 'm';
}

function updateGearBadge(gear, provider) {
  lastGear = gear;
  const el = document.getElementById('status-gear');
  el.className = 'gear-badge g' + Math.min(gear, 3);
  el.textContent = 'G' + gear + ' · ' + (provider || '?');
}

// ══════════════════════════════════════════════════════
//  SEMANTISK HÄLSA
// ══════════════════════════════════════════════════════
let healthData = null;

async function openHealthModal() {
  try {
    // Fråga Zero om semantisk hälsa via chat
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ message: 'semantisk hälsa', session_id: sessionId })
    });
    const d = await r.json();
    showHealthModal(d.response || 'Ingen data');
  } catch(e) {
    showHealthModal('Kunde inte hämta hälsostatus: ' + e.message);
  }
}

function showHealthModal(text) {
  const rows = document.getElementById('health-rows');
  rows.innerHTML = '';
  text.split('\n').forEach(line => {
    const div = document.createElement('div');
    div.className = 'h-row';
    const isOk   = line.includes('OK') && !line.includes('⚠️');
    const isWarn = line.includes('⚠️') || line.includes('FALLBACK');
    const isErr  = line.includes('DEGRADED') || line.includes('✗');
    div.innerHTML = `<span class="h-key">${escHtml(line.trim())}</span>`;
    div.style.borderLeft = isErr ? '2px solid #c05a5a' : isWarn ? '2px solid #c4a800' : 'none';
    div.style.paddingLeft = '8px';
    rows.appendChild(div);
  });
  document.getElementById('health-modal').classList.add('open');
}

function closeHealthModal() {
  document.getElementById('health-modal').classList.remove('open');
}

// ══════════════════════════════════════════════════════
//  SEND MESSAGE
// ══════════════════════════════════════════════════════
async function sendMessage() {
  const ta   = document.getElementById('user-input');
  const text = ta.value.trim();
  const imgs = [...pendingImages];
  const fils = [...pendingFiles];
  if (!text && !imgs.length && !fils.length) return;
  if (isThinking) return;

  ta.value = '';
  ta.style.height = 'auto';
  pendingImages = [];
  pendingFiles  = [];
  renderPreviews();

  // Sätt titel
  if (sessionTok === 0 && text) {
    const t = text.slice(0, 44) + (text.length > 44 ? '…' : '');
    document.getElementById('chat-title').textContent = t;
  }

  // Dölj welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  addMessage('user', text, imgs, fils);
  setThinking(true);

  // Bygg request
  const body = { message: text, session_id: sessionId };
  if (imgs.length) {
    body.attachments = imgs.map(i => ({
      type: 'image', data: i.base64, media_type: i.mediaType, name: i.name
    }));
  }
  if (fils.length) {
    body.attachments = (body.attachments || []).concat(
      fils.map(f => ({ type: f.fileType || 'text', data: f.text || f.base64, name: f.name }))
    );
  }

  try {
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    setThinking(false);

    if (!r.ok) {
      addMessage('assistant', '❌ Fel: ' + (d.error || r.status), [], []);
      return;
    }

    if (d.gear) updateGearBadge(d.gear, d.provider);

    addMessage('assistant', d.response || '', [], [], d.thinking || [], {
      gear: d.gear, provider: d.provider,
      cost: d.cost_sek, lat: d.latency
    });

    // Uppdatera kostnad
    sessionCost += d.cost_sek || 0;
    sessionTok  += (d.in_tok || 0) + (d.out_tok || 0);
    if (sessionCost > 0.001) {
      document.getElementById('session-cost').textContent =
        '~' + sessionCost.toFixed(3) + ' kr';
    }

    // Uppdatera semantisk hälsa-badge
    updateSemHealth(d.response || '');

  } catch(err) {
    setThinking(false);
    addMessage('assistant', '❌ Nätverksfel: ' + err.message, [], []);
  }
}

function updateSemHealth(response) {
  const el = document.getElementById('sem-health');
  if (response.includes('DEGRADED')) {
    el.className = 'err'; el.textContent = '⬡ emb: degraded';
  } else if (response.includes('FALLBACK')) {
    el.className = 'warn'; el.textContent = '⬡ emb: fallback';
  } else if (response.includes('ollama')) {
    el.className = 'ok'; el.textContent = '⬡ emb: ok';
  }
}

// ══════════════════════════════════════════════════════
//  RENDER MESSAGES
// ══════════════════════════════════════════════════════
function addMessage(role, text, imgs, fils, thinking, meta) {
  const thinkingEl = document.getElementById('thinking');
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + role;

  const label = role === 'user' ? 'Du' : 'Zero';
  let html = `<div class="msg-role">${label}</div><div class="msg-bubble">`;

  if (imgs && imgs.length) {
    imgs.forEach(i => {
      html += `<img class="msg-image" src="${i.previewUrl}" alt="${escHtml(i.name||'bild')}">`;
    });
  }
  if (fils && fils.length) {
    fils.forEach(f => {
      html += `<div style="font-size:12px;color:var(--text2);margin-bottom:4px">📎 ${escHtml(f.name)}</div>`;
    });
  }

  if (text) {
    html += role === 'assistant' ? renderMd(text) : `<span>${escHtml(text)}</span>`;
  }
  html += '</div>';

  if (thinking && thinking.length) {
    const tid = 'th-' + Date.now();
    html += `<span class="thought-toggle" onclick="toggleThought('${tid}',this)">
      <span class="t-arrow">▶</span> Tankegång (${thinking.length} steg)
    </span>
    <div class="thought-panel" id="${tid}">
      ${thinking.map(s => `<div class="thought-step">${escHtml(s)}</div>`).join('')}
    </div>`;
  }

  if (meta) {
    const parts = [];
    if (meta.gear)     parts.push('G' + meta.gear);
    if (meta.provider) parts.push(meta.provider);
    if (meta.lat)      parts.push(meta.lat + 's');
    if (meta.cost && meta.cost > 0.0001) parts.push('~' + meta.cost.toFixed(4) + ' kr');
    if (parts.length) {
      html += `<div class="msg-meta">${parts.join(' · ')}</div>`;
    }
  }

  wrap.innerHTML = html;

  // Copy-knappar på kodblock
  wrap.querySelectorAll('pre').forEach(pre => {
    pre.style.position = 'relative';
    const btn = document.createElement('button');
    btn.className   = 'copy-code-btn';
    btn.textContent = 'Kopiera';
    btn.onclick = () => {
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent || pre.textContent);
      btn.textContent = 'Kopierat!';
      setTimeout(() => btn.textContent = 'Kopiera', 1500);
    };
    pre.appendChild(btn);
  });

  msgs.insertBefore(wrap, thinkingEl);
  msgs.scrollTop = msgs.scrollHeight;
}

function toggleThought(id, btn) {
  const panel = document.getElementById(id);
  const arrow = btn.querySelector('.t-arrow');
  panel.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ══════════════════════════════════════════════════════
//  MARKDOWN
// ══════════════════════════════════════════════════════
function renderMd(text) {
  try {
    if (typeof marked !== 'undefined') return marked.parse(text);
  } catch(e) {}
  return `<span>${escHtml(text)}</span>`;
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════════════
//  THINKING
// ══════════════════════════════════════════════════════
function setThinking(on) {
  isThinking = on;
  const el = document.getElementById('thinking');
  el.classList.toggle('visible', on);
  document.getElementById('send-btn').disabled = on;
  if (on) {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }
}

// ══════════════════════════════════════════════════════
//  TEXTAREA
// ══════════════════════════════════════════════════════
function setupTextarea() {
  const ta = document.getElementById('user-input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
    const approx = Math.round(ta.value.length / 4);
    document.getElementById('tok-count').textContent = approx > 0 ? '~' + approx + ' tokens' : '';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ══════════════════════════════════════════════════════
//  FILES
// ══════════════════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', e => {
  handleAllFiles([...e.target.files]);
  e.target.value = '';
});

function handleAllFiles(files) {
  files.forEach(f => f.type.startsWith('image/') ? handleImg(f) : handleDoc(f));
}

function handleImg(file) {
  const r = new FileReader();
  r.onload = ev => {
    const data = ev.target.result;
    pendingImages.push({ base64: data.split(',')[1], mediaType: file.type, previewUrl: data, name: file.name });
    renderPreviews();
  };
  r.readAsDataURL(file);
}

function handleDoc(file) {
  const r = new FileReader();
  r.onload = ev => {
    pendingFiles.push({ name: file.name, text: ev.target.result,
      size: fmtBytes(file.size), fileType: file.name.endsWith('.pdf') ? 'pdf' : 'text' });
    renderPreviews();
  };
  r.readAsText(file);
}

function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

function renderPreviews() {
  const row = document.getElementById('preview-row');
  row.innerHTML = '';
  pendingImages.forEach((img, i) => {
    const d = document.createElement('div');
    d.className = 'preview-item';
    d.innerHTML = `<img src="${img.previewUrl}"><span>${escHtml(img.name)}</span>
      <button class="preview-rm" onclick="removeImg(${i})">×</button>`;
    row.appendChild(d);
  });
  pendingFiles.forEach((f, i) => {
    const d = document.createElement('div');
    d.className = 'preview-item';
    d.innerHTML = `<span>📎</span><span>${escHtml(f.name)}</span><span style="color:var(--text3)">${f.size}</span>
      <button class="preview-rm" onclick="removeFile(${i})">×</button>`;
    row.appendChild(d);
  });
}

function removeImg(i)  { pendingImages.splice(i,1); renderPreviews(); }
function removeFile(i) { pendingFiles.splice(i,1);  renderPreviews(); }

// ══════════════════════════════════════════════════════
//  DRAG & DROP + PASTE
// ══════════════════════════════════════════════════════
function setupDragDrop() {
  const overlay = document.getElementById('drag-overlay');
  let depth = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); depth++; overlay.classList.add('active'); });
  document.addEventListener('dragleave', () => { if (--depth <= 0) { depth=0; overlay.classList.remove('active'); } });
  document.addEventListener('dragover',  e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); depth=0; overlay.classList.remove('active');
    if (e.dataTransfer.files.length) handleAllFiles([...e.dataTransfer.files]);
  });
}

function setupPaste() {
  document.addEventListener('paste', e => {
    const items = [...(e.clipboardData?.items||[])].filter(i => i.type.startsWith('image/'));
    if (!items.length) return;
    e.preventDefault();
    items.forEach(i => { const f = i.getAsFile(); if(f) handleImg(f); });
  });
}

// ══════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════
function showToast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

// ══════════════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeHealthModal();
});
</script>
</body>
